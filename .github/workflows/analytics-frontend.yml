name: Analytics Frontend Deployment

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'analytics-frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Analytics Backend Docker Image
        run: |
          docker build -t intuteai/analytics-frontend:latest ./analytics-frontend

      - name: Push Analytics Backend Docker Image
        run: |
          docker push intuteai/analytics-frontend:latest

      - name: SSH to VPS and Deploy Analytics Frontend
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/website-docker
            docker-compose pull analytics-frontend
            docker-compose up -d analytics-frontend
